<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Test Login Minimal</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            max-width: 400px;
            width: 100%;
        }
        h1 { color: #333; margin-bottom: 10px; text-align: center; }
        .subtitle { color: #666; text-align: center; margin-bottom: 30px; font-size: 14px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 5px; color: #555; font-weight: bold; }
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover { background: #5568d3; }
        button:active { transform: scale(0.98); }
        .message {
            margin-top: 15px;
            padding: 10px;
            border-radius: 5px;
            text-align: center;
            display: none;
        }
        .success { background: #d4edda; color: #155724; display: block; }
        .error { background: #f8d7da; color: #721c24; display: block; }
        .info {
            background: #e7f3ff;
            padding: 15px;
            border-radius: 5px;
            margin-top: 20px;
            font-size: 13px;
        }
        .info strong { color: #0066cc; }
        #dashboard {
            display: none;
            text-align: center;
        }
        #dashboard h2 { color: #667eea; margin-bottom: 20px; }
        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin: 20px 0;
        }
        .stat-box {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            border: 2px solid #e9ecef;
        }
        .stat-label { font-size: 12px; color: #666; margin-bottom: 5px; }
        .stat-value { font-size: 24px; font-weight: bold; color: #667eea; }
        .logout-btn {
            background: #dc3545;
            margin-top: 20px;
        }
        .logout-btn:hover { background: #c82333; }
    </style>
</head>
<body>
    <div class="container">
        <!-- Login Form -->
        <div id="loginForm">
            <h1>🏦 INVANKRI</h1>
            <p class="subtitle">Investasi & BANK NKRI</p>
            
            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="Masukkan username" autocomplete="off">
            </div>
            
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Masukkan password">
            </div>
            
            <button onclick="doLogin()">LOGIN</button>
            
            <div id="message" class="message"></div>
            
            <div class="info">
                <strong>Demo Account:</strong><br>
                Username: <strong>demo</strong><br>
                Password: <strong>demo123</strong>
            </div>
        </div>
        
        <!-- Dashboard -->
        <div id="dashboard">
            <h2>✅ Login Berhasil!</h2>
            <p>Selamat datang, <strong id="displayUser"></strong></p>
            
            <div class="stats">
                <div class="stat-box">
                    <div class="stat-label">Saldo</div>
                    <div class="stat-value">Rp 0</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">Total Setor</div>
                    <div class="stat-value">Rp 0</div>
                </div>
            </div>
            
            <button class="logout-btn" onclick="doLogout()">LOGOUT</button>
        </div>
    </div>

    <script>
        // Demo accounts
        const users = {
            'demo': 'demo123',
            'admin': 'admin123',
            'dirut': 'dirut2026',
            'test': 'test123'
        };
        
        // Elements
        const loginForm = document.getElementById('loginForm');
        const dashboard = document.getElementById('dashboard');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const messageDiv = document.getElementById('message');
        const displayUser = document.getElementById('displayUser');
        
        // Show message
        function showMessage(text, type) {
            messageDiv.textContent = text;
            messageDiv.className = 'message ' + type;
            setTimeout(() => {
                messageDiv.className = 'message';
            }, 3000);
        }
        
        // Login function
        function doLogin() {
            const username = usernameInput.value.trim();
            const password = passwordInput.value;
            
            console.log('Login attempt:', username);
            
            if (!username || !password) {
                showMessage('Username dan password harus diisi!', 'error');
                return;
            }
            
            if (users[username] && users[username] === password) {
                console.log('Login success!');
                showMessage('Login berhasil!', 'success');
                
                setTimeout(() => {
                    loginForm.style.display = 'none';
                    dashboard.style.display = 'block';
                    displayUser.textContent = username;
                }, 500);
            } else {
                console.log('Login failed!');
                showMessage('Username atau password salah!', 'error');
            }
        }
        
        // Logout function
        function doLogout() {
            loginForm.style.display = 'block';
            dashboard.style.display = 'none';
            usernameInput.value = '';
            passwordInput.value = '';
        }
        
        // Enter key support
        passwordInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                doLogin();
            }
        });
        
        console.log('✅ Login test ready!');
        console.log('Available accounts:', Object.keys(users));
    </script>
</body>
</html>
