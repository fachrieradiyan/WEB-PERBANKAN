<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INVANKRI - Investasi & BANK NKRI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#0F172A',
                        secondary: '#1E293B',
                        accent: '#10B981',
                        danger: '#EF4444',
                    }
                }
            }
        }
    </script>
    
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        .gradient-bg {
            background: linear-gradient(135deg, #0F172A 0%, #1E293B 50%, #334155 100%);
        }
    </style>
</head>
<body class="bg-gray-50">
    
    <!-- Login Screen -->
    <div id="authScreen" class="min-h-screen gradient-bg flex items-center justify-center px-4">
        <div class="max-w-md w-full">
            <div class="text-center mb-6">
                <div class="inline-block bg-accent p-4 rounded-2xl mb-3">
                    <i class="fas fa-chart-line text-4xl text-white"></i>
                </div>
                <h1 class="text-5xl font-bold text-white mb-2">INVANKRI</h1>
                <p class="text-gray-300">Investasi & BANK NKRI</p>
            </div>

            <div class="bg-white rounded-3xl shadow-2xl overflow-hidden">
                <!-- Login Form -->
                <div class="p-8">
                    <h2 class="text-2xl font-bold text-gray-800 mb-6">Masuk ke Akun Anda</h2>
                    
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Username</label>
                            <input 
                                type="text" 
                                id="loginUsername" 
                                placeholder="Masukkan username"
                                class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-accent focus:border-transparent text-gray-900"
                            >
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Password</label>
                            <input 
                                type="password" 
                                id="loginPassword" 
                                placeholder="Masukkan password"
                                class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-accent focus:border-transparent text-gray-900"
                            >
                        </div>
                        
                        <button 
                            id="loginBtn"
                            class="w-full bg-accent hover:bg-green-600 text-white font-bold py-3 rounded-xl transition duration-200 transform hover:scale-[1.02]">
                            <i class="fas fa-sign-in-alt mr-2"></i>Masuk
                        </button>
                    </div>
                    
                    <div class="mt-6 p-4 bg-blue-50 rounded-xl border border-blue-200">
                        <p class="text-xs text-blue-800 font-semibold mb-2">💡 Demo Account:</p>
                        <p class="text-xs text-blue-700">Username: <span class="font-mono font-bold">dirut</span></p>
                        <p class="text-xs text-blue-700">Password: <span class="font-mono font-bold">dirut2026</span></p>
                    </div>
                    
                    <div id="notification" class="mt-4 hidden"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- App Screen -->
    <div id="appScreen" class="min-h-screen hidden">
        <!-- Header -->
        <header class="gradient-bg text-white shadow-lg sticky top-0 z-40">
            <div class="container mx-auto px-4 py-4">
                <div class="flex justify-between items-center">
                    <div class="flex items-center gap-3">
                        <div class="bg-accent p-2 rounded-lg">
                            <i class="fas fa-chart-line text-2xl"></i>
                        </div>
                        <div>
                            <h1 class="text-2xl font-bold">INVANKRI</h1>
                            <p class="text-xs text-gray-300">Investasi & BANK NKRI</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-4">
                        <div class="text-right">
                            <p class="text-xs text-gray-300">Selamat datang,</p>
                            <p class="font-bold" id="currentUser"></p>
                        </div>
                        <button 
                            id="logoutBtn"
                            class="bg-danger hover:bg-red-600 text-white px-4 py-2 rounded-lg transition duration-200">
                            <i class="fas fa-sign-out-alt mr-2"></i>Keluar
                        </button>
                    </div>
                </div>
            </div>
        </header>

        <!-- Dashboard -->
        <div class="container mx-auto px-4 py-8">
            <!-- Balance Card -->
            <div class="bg-gradient-to-br from-slate-800 to-slate-900 rounded-3xl shadow-2xl p-8 mb-8 text-white">
                <div class="flex justify-between items-start mb-6">
                    <div>
                        <p class="text-sm opacity-75 mb-2">Total Saldo</p>
                        <h2 class="text-5xl font-bold mb-1">
                            Rp <span id="balance">0</span>
                        </h2>
                    </div>
                    <div class="bg-white/10 backdrop-blur-sm px-4 py-2 rounded-xl">
                        <i class="fas fa-wallet text-2xl"></i>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-white/10 backdrop-blur-sm p-4 rounded-xl">
                        <p class="text-xs opacity-75 mb-1">Total Setoran</p>
                        <p class="text-lg font-bold">Rp <span id="totalDeposit">0</span></p>
                    </div>
                    <div class="bg-white/10 backdrop-blur-sm p-4 rounded-xl">
                        <p class="text-xs opacity-75 mb-1">Total Penarikan</p>
                        <p class="text-lg font-bold">Rp <span id="totalWithdraw">0</span></p>
                    </div>
                </div>
            </div>

            <!-- Transaction Forms -->
            <div class="grid md:grid-cols-2 gap-6 mb-8">
                <!-- Deposit Form -->
                <div class="bg-white rounded-2xl shadow-lg p-6">
                    <div class="flex items-center gap-3 mb-4">
                        <div class="bg-accent/10 p-3 rounded-xl">
                            <i class="fas fa-plus-circle text-2xl text-accent"></i>
                        </div>
                        <h3 class="text-xl font-bold text-gray-800">Setor Saldo</h3>
                    </div>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Jumlah</label>
                            <input 
                                type="number" 
                                id="depositAmount" 
                                placeholder="Masukkan jumlah"
                                class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-accent"
                            >
                        </div>
                        <button 
                            id="depositBtn"
                            class="w-full bg-accent hover:bg-green-600 text-white font-bold py-3 rounded-xl transition">
                            <i class="fas fa-arrow-down mr-2"></i>Setor Uang
                        </button>
                    </div>
                </div>

                <!-- Withdraw Form -->
                <div class="bg-white rounded-2xl shadow-lg p-6">
                    <div class="flex items-center gap-3 mb-4">
                        <div class="bg-danger/10 p-3 rounded-xl">
                            <i class="fas fa-minus-circle text-2xl text-danger"></i>
                        </div>
                        <h3 class="text-xl font-bold text-gray-800">Tarik Saldo</h3>
                    </div>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">Jumlah</label>
                            <input 
                                type="number" 
                                id="withdrawAmount" 
                                placeholder="Masukkan jumlah"
                                class="w-full px-4 py-3 border-2 border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-danger"
                            >
                        </div>
                        <button 
                            id="withdrawBtn"
                            class="w-full bg-danger hover:bg-red-600 text-white font-bold py-3 rounded-xl transition">
                            <i class="fas fa-arrow-up mr-2"></i>Tarik Uang
                        </button>
                    </div>
                </div>
            </div>

            <!-- Transaction History -->
            <div class="bg-white rounded-2xl shadow-lg p-6">
                <h3 class="text-2xl font-bold text-gray-800 mb-6 flex items-center gap-2">
                    <i class="fas fa-history text-gray-600"></i>
                    Riwayat Transaksi
                </h3>
                <div id="transactionHistory" class="space-y-3">
                    <p class="text-gray-500 text-center py-4">Belum ada transaksi</p>
                </div>
            </div>
        </div>
    </div>

    <!-- JavaScript -->
    <script>
        console.log('🚀 INVANKRI Starting...');
        
        // State
        let currentUser = null;
        let balance = 0;
        let totalDeposit = 0;
        let totalWithdraw = 0;
        let transactions = [];
        
        // VIP Accounts
        const VIP_ACCOUNTS = {
            'dirut': {
                password: 'dirut2026',
                name: 'Direktur Utama',
                isVIP: true
            }
        };
        
        // Elements
        const authScreen = document.getElementById('authScreen');
        const appScreen = document.getElementById('appScreen');
        const loginBtn = document.getElementById('loginBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const depositBtn = document.getElementById('depositBtn');
        const withdrawBtn = document.getElementById('withdrawBtn');
        
        // Show notification
        function showNotification(message, type) {
            const notif = document.getElementById('notification');
            notif.textContent = message;
            notif.className = `mt-4 p-3 rounded-lg text-center ${
                type === 'success' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'
            }`;
            notif.classList.remove('hidden');
            
            setTimeout(() => {
                notif.classList.add('hidden');
            }, 3000);
        }
        
        // Format currency
        function formatCurrency(amount) {
            return Math.floor(amount).toLocaleString('id-ID');
        }
        
        // Update display
        function updateDisplay() {
            document.getElementById('balance').textContent = formatCurrency(balance);
            document.getElementById('totalDeposit').textContent = formatCurrency(totalDeposit);
            document.getElementById('totalWithdraw').textContent = formatCurrency(totalWithdraw);
            document.getElementById('currentUser').textContent = currentUser;
        }
        
        // Render transactions
        function renderTransactions() {
            const container = document.getElementById('transactionHistory');
            
            if (transactions.length === 0) {
                container.innerHTML = '<p class="text-gray-500 text-center py-4">Belum ada transaksi</p>';
                return;
            }
            
            container.innerHTML = transactions.map(t => `
                <div class="flex items-center justify-between p-4 bg-gray-50 rounded-xl">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 rounded-full flex items-center justify-center ${
                            t.type === 'deposit' ? 'bg-green-100' : 'bg-red-100'
                        }">
                            <i class="fas fa-${t.type === 'deposit' ? 'arrow-down' : 'arrow-up'} ${
                            t.type === 'deposit' ? 'text-green-600' : 'text-red-600'
                        }"></i>
                        </div>
                        <div>
                            <p class="font-semibold text-gray-800">${
                                t.type === 'deposit' ? 'Setor' : 'Tarik'
                            }</p>
                            <p class="text-xs text-gray-500">${t.date}</p>
                        </div>
                    </div>
                    <div class="text-right">
                        <p class="font-bold ${t.type === 'deposit' ? 'text-green-600' : 'text-red-600'}">
                            ${t.type === 'deposit' ? '+' : '-'}Rp ${formatCurrency(t.amount)}
                        </p>
                        <p class="text-xs text-gray-500">Saldo: Rp ${formatCurrency(t.balanceAfter)}</p>
                    </div>
                </div>
            `).join('');
        }
        
        // Save data
        function saveData() {
            if (!currentUser) return;
            
            const users = JSON.parse(localStorage.getItem('bankAppUsers') || '{}');
            users[currentUser] = {
                password: users[currentUser]?.password || 'default',
                balance,
                totalDeposit,
                totalWithdraw,
                transactions
            };
            localStorage.setItem('bankAppUsers', JSON.stringify(users));
        }
        
        // Load data
        function loadData() {
            if (!currentUser) return;
            
            const users = JSON.parse(localStorage.getItem('bankAppUsers') || '{}');
            if (users[currentUser]) {
                balance = users[currentUser].balance || 0;
                totalDeposit = users[currentUser].totalDeposit || 0;
                totalWithdraw = users[currentUser].totalWithdraw || 0;
                transactions = users[currentUser].transactions || [];
            }
        }
        
        // Login
        function login() {
            console.log('🔐 Login attempt');
            
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;
            
            if (!username || !password) {
                showNotification('Username dan password harus diisi!', 'error');
                return;
            }
            
            // Check VIP
            if (VIP_ACCOUNTS[username]) {
                if (VIP_ACCOUNTS[username].password === password) {
                    currentUser = username;
                    localStorage.setItem('currentUser', username);
                    
                    loadData();
                    authScreen.classList.add('hidden');
                    appScreen.classList.remove('hidden');
                    updateDisplay();
                    renderTransactions();
                    
                    showNotification('Selamat datang, ' + VIP_ACCOUNTS[username].name + '! 👑', 'success');
                    return;
                }
            }
            
            // Check regular users
            const users = JSON.parse(localStorage.getItem('bankAppUsers') || '{}');
            if (users[username] && users[username].password === password) {
                currentUser = username;
                localStorage.setItem('currentUser', username);
                
                loadData();
                authScreen.classList.add('hidden');
                appScreen.classList.remove('hidden');
                updateDisplay();
                renderTransactions();
                
                showNotification('Login berhasil!', 'success');
            } else {
                showNotification('Username atau password salah!', 'error');
            }
        }
        
        // Logout
        function logout() {
            if (confirm('Apakah Anda yakin ingin keluar?')) {
                saveData();
                localStorage.removeItem('currentUser');
                
                currentUser = null;
                balance = 0;
                totalDeposit = 0;
                totalWithdraw = 0;
                transactions = [];
                
                authScreen.classList.remove('hidden');
                appScreen.classList.add('hidden');
                
                document.getElementById('loginUsername').value = '';
                document.getElementById('loginPassword').value = '';
                
                showNotification('Logout berhasil!', 'success');
            }
        }
        
        // Deposit
        function deposit() {
            const amount = parseFloat(document.getElementById('depositAmount').value);
            
            if (!amount || amount <= 0) {
                showNotification('Masukkan jumlah yang valid!', 'error');
                return;
            }
            
            balance += amount;
            totalDeposit += amount;
            
            transactions.unshift({
                type: 'deposit',
                amount: amount,
                date: new Date().toLocaleString('id-ID'),
                balanceAfter: balance
            });
            
            updateDisplay();
            renderTransactions();
            saveData();
            
            document.getElementById('depositAmount').value = '';
            showNotification('Berhasil menyetor Rp ' + formatCurrency(amount), 'success');
        }
        
        // Withdraw
        function withdraw() {
            const amount = parseFloat(document.getElementById('withdrawAmount').value);
            
            if (!amount || amount <= 0) {
                showNotification('Masukkan jumlah yang valid!', 'error');
                return;
            }
            
            if (amount > balance) {
                showNotification('Saldo tidak mencukupi!', 'error');
                return;
            }
            
            balance -= amount;
            totalWithdraw += amount;
            
            transactions.unshift({
                type: 'withdraw',
                amount: amount,
                date: new Date().toLocaleString('id-ID'),
                balanceAfter: balance
            });
            
            updateDisplay();
            renderTransactions();
            saveData();
            
            document.getElementById('withdrawAmount').value = '';
            showNotification('Berhasil menarik Rp ' + formatCurrency(amount), 'success');
        }
        
        // Event listeners
        loginBtn.addEventListener('click', login);
        logoutBtn.addEventListener('click', logout);
        depositBtn.addEventListener('click', deposit);
        withdrawBtn.addEventListener('click', withdraw);
        
        // Enter key support
        document.getElementById('loginPassword').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') login();
        });
        
        // Check if already logged in
        const savedUser = localStorage.getItem('currentUser');
        if (savedUser) {
            currentUser = savedUser;
            loadData();
            authScreen.classList.add('hidden');
            appScreen.classList.remove('hidden');
            updateDisplay();
            renderTransactions();
        }
        
        console.log('✅ INVANKRI Ready!');
    </script>
</body>
</html>
