<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Login - INVANKRI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // Simple test login function
        function testLogin() {
            const username = document.getElementById('testUsername').value;
            const password = document.getElementById('testPassword').value;
            
            console.log('Login clicked!');
            console.log('Username:', username);
            console.log('Password:', password);
            
            alert('Login function works! Username: ' + username);
        }
    </script>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-md mx-auto bg-white rounded-xl shadow-lg p-6">
        <h1 class="text-2xl font-bold mb-4">Test Login Form</h1>
        
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-medium mb-1">Username</label>
                <input 
                    type="text" 
                    id="testUsername" 
                    class="w-full px-4 py-2 border rounded-lg"
                    placeholder="Enter username"
                >
            </div>
            
            <div>
                <label class="block text-sm font-medium mb-1">Password</label>
                <input 
                    type="password" 
                    id="testPassword" 
                    class="w-full px-4 py-2 border rounded-lg"
                    placeholder="Enter password"
                >
            </div>
            
            <button 
                onclick="testLogin()" 
                class="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-2 rounded-lg">
                Test Login Button
            </button>
        </div>
        
        <div class="mt-6 p-4 bg-blue-50 rounded-lg">
            <p class="text-sm font-semibold mb-2">Debug Info:</p>
            <p class="text-xs">1. Klik tombol "Test Login Button"</p>
            <p class="text-xs">2. Jika muncul alert, berarti button berfungsi</p>
            <p class="text-xs">3. Buka Console (F12) untuk lihat log</p>
        </div>
    </div>
</body>
</html>
