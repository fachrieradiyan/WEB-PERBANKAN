<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test LocalStorage - Investra</title>
    <style>
        body {
            font-family: 'Courier New', monospace;
            padding: 20px;
            background: #1a1a1a;
            color: #00ff00;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: #000;
            padding: 20px;
            border: 2px solid #00ff00;
            border-radius: 10px;
        }
        h1 {
            color: #00ff00;
            text-align: center;
        }
        button {
            background: #00ff00;
            color: #000;
            border: none;
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
            font-weight: bold;
            border-radius: 5px;
        }
        button:hover {
            background: #00cc00;
        }
        pre {
            background: #111;
            padding: 15px;
            border: 1px solid #00ff00;
            border-radius: 5px;
            overflow-x: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
        }
        .section {
            margin: 20px 0;
            padding: 15px;
            border: 1px solid #333;
            border-radius: 5px;
        }
        .success { color: #00ff00; }
        .error { color: #ff0000; }
        .warning { color: #ffaa00; }
        .info { color: #00aaff; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 INVESTRA - LOCALSTORAGE DEBUGGER</h1>
        
        <div class="section">
            <h2>📊 Quick Actions</h2>
            <button onclick="checkStorage()">🔍 Check Storage</button>
            <button onclick="showCurrentUser()">👤 Show Current User</button>
            <button onclick="showAllUsers()">👥 Show All Users</button>
            <button onclick="clearStorage()">🗑️ Clear Storage</button>
            <button onclick="location.href='index.html'">🏠 Back to App</button>
        </div>

        <div class="section">
            <h2>📝 Console Output</h2>
            <pre id="output">Click a button to see results...</pre>
        </div>
    </div>

    <script>
        const output = document.getElementById('output');

        function log(message, type = 'info') {
            const colors = {
                success: '#00ff00',
                error: '#ff0000',
                warning: '#ffaa00',
                info: '#00aaff'
            };
            const color = colors[type] || colors.info;
            output.innerHTML += `<span style="color: ${color}">${message}</span>\n`;
        }

        function clearOutput() {
            output.innerHTML = '';
        }

        function checkStorage() {
            clearOutput();
            log('=== CHECKING LOCALSTORAGE ===', 'info');
            log('');

            // Check if localStorage is available
            if (typeof(Storage) !== "undefined") {
                log('✓ localStorage is AVAILABLE', 'success');
            } else {
                log('✗ localStorage is NOT AVAILABLE', 'error');
                return;
            }

            // Check all keys
            log('');
            log('All localStorage keys:', 'info');
            for (let i = 0; i < localStorage.length; i++) {
                const key = localStorage.key(i);
                log(`  - ${key}`, 'success');
            }

            // Check specific keys
            log('');
            log('Investra specific keys:', 'info');
            const currentUser = localStorage.getItem('currentUser');
            const isVIP = localStorage.getItem('isVIP');
            const darkMode = localStorage.getItem('darkMode');
            const currentPage = localStorage.getItem('currentPage');

            log(`  currentUser: ${currentUser || 'NOT SET'}`, currentUser ? 'success' : 'warning');
            log(`  isVIP: ${isVIP || 'NOT SET'}`, isVIP ? 'success' : 'warning');
            log(`  darkMode: ${darkMode || 'NOT SET'}`, darkMode ? 'success' : 'warning');
            log(`  currentPage: ${currentPage || 'NOT SET'}`, currentPage ? 'success' : 'warning');

            log('');
            log('=== CHECK COMPLETE ===', 'info');
        }

        function showCurrentUser() {
            clearOutput();
            log('=== CURRENT USER DATA ===', 'info');
            log('');

            const currentUser = localStorage.getItem('currentUser');
            if (!currentUser) {
                log('✗ No user is currently logged in', 'error');
                return;
            }

            log(`Current User: ${currentUser}`, 'success');
            log('');

            const users = JSON.parse(localStorage.getItem('bankAppUsers') || '{}');
            if (!users[currentUser]) {
                log('✗ User data not found in localStorage', 'error');
                return;
            }

            const userData = users[currentUser];
            log('User Data:', 'info');
            log(`  Balance: Rp ${formatNumber(userData.balance || 0)}`, 'success');
            log(`  Total Deposit: Rp ${formatNumber(userData.totalDeposit || 0)}`, 'success');
            log(`  Total Withdraw: Rp ${formatNumber(userData.totalWithdraw || 0)}`, 'success');
            log(`  Transactions: ${(userData.transactions || []).length}`, 'success');
            log('');

            // Stocks
            if (userData.stocks && userData.stocks.length > 0) {
                log(`Stocks (${userData.stocks.length}):`, 'info');
                userData.stocks.forEach(stock => {
                    log(`  - ${stock.id}: ${stock.owned} shares @ Rp ${formatNumber(stock.buyPrice)}`, 'success');
                });
            } else {
                log('Stocks: NONE', 'warning');
            }
            log('');

            // Cryptos
            if (userData.cryptos && userData.cryptos.length > 0) {
                log(`Cryptos (${userData.cryptos.length}):`, 'info');
                userData.cryptos.forEach(crypto => {
                    log(`  - ${crypto.id}: ${crypto.owned} coins @ Rp ${formatNumber(crypto.buyPrice)}`, 'success');
                });
            } else {
                log('Cryptos: NONE', 'warning');
            }

            log('');
            log('=== DATA COMPLETE ===', 'info');
        }

        function showAllUsers() {
            clearOutput();
            log('=== ALL USERS ===', 'info');
            log('');

            const users = JSON.parse(localStorage.getItem('bankAppUsers') || '{}');
            const usernames = Object.keys(users);

            if (usernames.length === 0) {
                log('✗ No users found', 'warning');
                return;
            }

            log(`Total Users: ${usernames.length}`, 'success');
            log('');

            usernames.forEach((username, index) => {
                const user = users[username];
                log(`${index + 1}. ${username}`, 'info');
                log(`   Balance: Rp ${formatNumber(user.balance || 0)}`, 'success');
                log(`   Stocks: ${(user.stocks || []).length}`, 'success');
                log(`   Cryptos: ${(user.cryptos || []).length}`, 'success');
                log(`   Transactions: ${(user.transactions || []).length}`, 'success');
                log('');
            });

            log('=== ALL USERS COMPLETE ===', 'info');
        }

        function clearStorage() {
            if (confirm('⚠️ WARNING: This will delete ALL data!\n\nAre you sure?')) {
                localStorage.clear();
                clearOutput();
                log('=== STORAGE CLEARED ===', 'warning');
                log('');
                log('All localStorage data has been deleted.', 'warning');
                log('You will need to register a new account.', 'info');
            }
        }

        function formatNumber(num) {
            return new Intl.NumberFormat('id-ID').format(num);
        }

        // Auto-check on load
        window.addEventListener('DOMContentLoaded', () => {
            checkStorage();
        });
    </script>
</body>
</html>
